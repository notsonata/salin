services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: always
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    expose:
      - "3000"
    restart: always
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    expose:
      - "8000"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../deploy/secrets:/run/secrets/salin:ro
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      youtube-pot-provider:
        condition: service_started

  youtube-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salin
      POSTGRES_USER: salin
      POSTGRES_PASSWORD: salin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salin -d salin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
